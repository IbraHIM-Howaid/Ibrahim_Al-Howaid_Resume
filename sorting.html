<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer | ICS4U</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'DM Mono', monospace;
            text-align: center;
            padding: 20px;
        }
        .header {
            margin-bottom: 20px;
        }
        
        .slider-container {
            margin: 15px 0;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        input[type="range"] {
            cursor: pointer;
            width: 200px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            background-color: #333;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .controls {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }
        .btn-race { background-color: #e91e63; }
        .btn-race:hover { background-color: #d81b60; }
        .btn-reset { background-color: #2196F3; }
        .btn-reset:hover { background-color: #1e88e5; }
        
        .visualizer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .algo-section {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
        }
        .array-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 250px;
            margin-top: 20px;
        }
        
        .bar {
            flex: 1; 
            background-color: #4CAF50;
            margin: 0 1px;
        }
        
        @media (max-width: 900px) {
            .visualizer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Algorithm Visualizer</h1>
        <p>Compare various sorting algorithms in real-time! Adjust the array size and watch how each algorithm performs.</p>
        
        <div class="slider-container">
            <label for="arraySize">Array Size: <span id="sizeLabel">25</span></label>
            <input type="range" id="arraySize" min="10" max="100" value="25" oninput="updateSize()">
            
            <label class="checkbox-container">
                <input type="checkbox" id="autoSpeed" checked onchange="updateSize()">
                Auto-Adjust Speed
            </label>
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="generateArrays()">Generate New Array</button>
            <button onclick="bubbleSort()">Run Bubble</button>
            <button onclick="selectionSort()">Run Selection</button>
            <button onclick="insertionSort()">Run Insertion</button>
            <button onclick="startMergeSort()">Run Merge</button>
            <button class="btn-race" onclick="startRace()">Race All!</button>
        </div>
    </div>

    <div class="visualizer-grid">
        <div class="algo-section">
            <h2>Bubble Sort O(n²)</h2>
            <div id="bubble-container" class="array-container"></div>
        </div>
        <div class="algo-section">
            <h2>Selection Sort O(n²)</h2>
            <div id="selection-container" class="array-container"></div>
        </div>
        <div class="algo-section">
            <h2>Insertion Sort O(n²)</h2>
            <div id="insertion-container" class="array-container"></div>
        </div>
        <div class="algo-section">
            <h2>Merge Sort O(n log n)</h2>
            <div id="merge-container" class="array-container"></div>
        </div>
    </div>

    <script>
        let baseArray = []; 
        let currentSize = 25; 
        let delayTime = 30; 

        function updateSize() {
            currentSize = document.getElementById('arraySize').value;
            document.getElementById('sizeLabel').innerText = currentSize;
            
            let isAutoSpeedChecked = document.getElementById('autoSpeed').checked;
            
            if (isAutoSpeedChecked) {
                delayTime = Math.max(5, 1000 / currentSize); 
            } else {
                delayTime = 30; 
            }
            
            generateArrays();
        }

        function generateArrays() {
            baseArray = [];
            for (let i = 0; i < currentSize; i++) {
                baseArray.push(Math.floor(Math.random() * 230) + 20); 
            }
            drawArray('bubble-container', baseArray);
            drawArray('selection-container', baseArray);
            drawArray('insertion-container', baseArray);
            drawArray('merge-container', baseArray);
        }

        function drawArray(containerId, arr) {
            let container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < arr.length; i++) {
                let bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = arr[i] + 'px';
                container.appendChild(bar);
            }
        }

        
        function sleep(ms) {
            return new Promise(function(resolve) {
                setTimeout(resolve, ms);
            });
        }

        // --- ALGORITHM 1: BUBBLE SORT ---
        async function bubbleSort() { 
            let arr = baseArray.slice(); // make a copy of the original array
            drawArray('bubble-container', arr); // draw the array on the screen
            let bars = document.querySelectorAll('#bubble-container .bar'); // grab all the bar elements
            
            for (let i = 0; i < arr.length; i++) {
                for (let j = 0; j < arr.length - i - 1; j++) { // compare each pair of neighbors
                    bars[j].style.backgroundColor = 'red'; 
                    bars[j+1].style.backgroundColor = 'red'; 
                    await sleep(delayTime); 

                    if (arr[j] > arr[j+1]) { // if the first one is bigger than the second
                        let temp = arr[j]; // save the first number temporarily
                        arr[j] = arr[j+1]; // swap - put the smaller one first
                        arr[j+1] = temp; // swap - put the bigger one second
                        
                        bars[j].style.height = arr[j] + 'px'; 
                        bars[j+1].style.height = arr[j+1] + 'px'; 
                    }
                    bars[j].style.backgroundColor = '#4CAF50'; 
                    bars[j+1].style.backgroundColor = '#4CAF50';
                }
            }
        }

        // --- ALGORITHM 2: SELECTION SORT ---
        async function selectionSort() { 
            let arr = baseArray.slice(); 
            drawArray('selection-container', arr); 
            let bars = document.querySelectorAll('#selection-container .bar'); 
            
            for (let i = 0; i < arr.length; i++) { 
                let minIdx = i; // assume the smallest value is at the current position
                bars[minIdx].style.backgroundColor = 'blue'; 
                
                for (let j = i + 1; j < arr.length; j++) { // look at all the remaining values
                    bars[j].style.backgroundColor = 'red'; 
                    await sleep(delayTime); 
                    
                    if (arr[j] < arr[minIdx]) { // if this value is smaller than our current smallest
                        bars[minIdx].style.backgroundColor = '#4CAF50'; // turn the old smallest back to green
                        minIdx = j;
                        bars[minIdx].style.backgroundColor = 'blue'; // highlight the new smallest in blue
                    } else { 
                        bars[j].style.backgroundColor = '#4CAF50'; 
                    }
                }
                
                if (minIdx !== i) { // if the smallest value isn't already in the right place
                    let temp = arr[i]; // save the value at current position
                    arr[i] = arr[minIdx]; // put the smallest value here
                    arr[minIdx] = temp; // put the old value where the smallest was
                    
                    bars[i].style.height = arr[i] + 'px'; 
                    bars[minIdx].style.height = arr[minIdx] + 'px'; 
                }
                bars[minIdx].style.backgroundColor = '#4CAF50'; 
                bars[i].style.backgroundColor = '#4CAF50'; 
            }
        }

        // --- ALGORITHM 3: INSERTION SORT ---
        async function insertionSort() { 
            let arr = baseArray.slice(); 
            drawArray('insertion-container', arr);
            let bars = document.querySelectorAll('#insertion-container .bar'); 
            
            for (let i = 1; i < arr.length; i++) { // start from the second element
                let key = arr[i]; // remember the value we're trying to insert
                let j = i - 1; // look at all the elements before it
                
                bars[i].style.backgroundColor = 'orange'; 
                await sleep(delayTime); 

                while (j >= 0 && arr[j] > key) { // while there are bigger values before it
                    bars[j].style.backgroundColor = 'red'; 
                    arr[j + 1] = arr[j]; // shift it one spot to the right
                    bars[j + 1].style.height = arr[j + 1] + 'px'; // update the height
                    await sleep(delayTime);
                    
                    bars[j].style.backgroundColor = '#4CAF50'; 
                    j = j - 1; // check the next element to the left
                }
                arr[j + 1] = key; // put our value in the right spot
                bars[j + 1].style.height = arr[j + 1] + 'px'; // update the height
                bars[i].style.backgroundColor = '#4CAF50'; 
            }
        }

        // --- ALGORITHM 4: MERGE SORT ---
        async function startMergeSort() { 
            let arr = baseArray.slice(); 
            drawArray('merge-container', arr);
            let bars = document.querySelectorAll('#merge-container .bar'); 
            await mergeSortLogic(arr, 0, arr.length - 1, bars); 
        }

        async function mergeSortLogic(arr, left, right, bars) { 
            if (left >= right) return; // if there's only one element, it's already sorted
            let middle = left + Math.floor((right - left) / 2); // find the middle to split the array
            
            await mergeSortLogic(arr, left, middle, bars); // sort the left half
            await mergeSortLogic(arr, middle + 1, right, bars); // sort the right half
            await merge(arr, left, middle, right, bars); // merge the two sorted halves
        }

        async function merge(arr, left, middle, right, bars) { // this combines two sorted parts into one
            let n1 = middle - left + 1; // how many elements in the left part
            let n2 = right - middle; // how many elements in the right part
            let L = new Array(n1); // make a temporary array for the left part
            let R = new Array(n2); // make a temporary array for the right part

            for (let i = 0; i < n1; i++) L[i] = arr[left + i]; // copy left part into temp array
            for (let j = 0; j < n2; j++) R[j] = arr[middle + 1 + j]; // copy right part into temp array

            let i = 0, j = 0, k = left; // pointers for left array, right array, and the result

            while (i < n1 && j < n2) { // while both temp arrays have elements to compare
                bars[k].style.backgroundColor = 'purple'; 
                await sleep(delayTime); 

                if (L[i] <= R[j]) { // if the left element is smaller or equal
                    arr[k] = L[i]; // put the left element in
                    bars[k].style.height = arr[k] + 'px'; 
                    i++; // move to the next element in the left array
                } else { // if the right element is smaller
                    arr[k] = R[j]; // put the right element in
                    bars[k].style.height = arr[k] + 'px';
                    j++; // move to the next element in the right array
                }
                bars[k].style.backgroundColor = '#4CAF50'; 
                k++;
            }

            while (i < n1) { // if there are leftover elements in the left array
                bars[k].style.backgroundColor = 'purple'; // highlight it
                await sleep(delayTime); // pause
                arr[k] = L[i]; // put the remaining element in
                bars[k].style.height = arr[k] + 'px'; // update height
                bars[k].style.backgroundColor = '#4CAF50'; // turn it back to green
                i++; // move to next element
                k++; // move to next spot
            }

            while (j < n2) { // if there are leftover elements in the right array
                bars[k].style.backgroundColor = 'purple'; // highlight it
                await sleep(delayTime); // pause
                arr[k] = R[j]; // put the remaining element in
                bars[k].style.height = arr[k] + 'px'; // update height
                bars[k].style.backgroundColor = '#4CAF50'; // turn it back to green
                j++; 
                k++; 
            }
        }

        function startRace() {
            bubbleSort();
            selectionSort();
            insertionSort();
            startMergeSort(); 
        }

        generateArrays();
    </script>
</body>
</html>
